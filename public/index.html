<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <header class="top-bar">
            <div>
                <h1>Group Chat App</h1>
                <p id="online-users">Users online: 0</p>
            </div>
            <div id="error" class="error"></div>
        </header>

        <main class="chat-panel">
            <div id="messages" class="messages" aria-live="polite"></div>
        </main>

        <footer class="composer">
            <label for="message" class="sr-only">Type your message</label>
            <input type="text" id="message" placeholder="Type a message..." autocomplete="off" />
            <button id="sendBtn" type="button">Send</button>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io()
        const sendBtn = document.getElementById("sendBtn")
        const messageInput = document.getElementById("message")
        const allMessages = document.getElementById("messages")
        const errorDiv = document.getElementById('error')
        const onlineUsersDiv = document.getElementById('online-users')

        socket.on('room full', (msg) => {
            errorDiv.textContent = msg
            messageInput.disabled = true
        })

        socket.on('update user count', (count) => {
            onlineUsersDiv.textContent = `Users online: ${count}`
        })

        socket.on('chat history', (history) => {
            history.forEach(msg => {
                const { sender, content } = msg
                const div = document.createElement('div')
                div.className = 'message bubble received'
                div.textContent = `${sender}: ${content}`
                allMessages.appendChild(div)
            })
        })

        socket.on('message', (message) => {
            const p = document.createElement('p')
            p.innerText = message
            p.className = 'message bubble received'
            allMessages.appendChild(p)
            allMessages.scrollTop = allMessages.scrollHeight
        })

        sendBtn.addEventListener("click", () => {
            const message = messageInput.value.trim()
            if (!message) return
            socket.emit('user-message', message)
            messageInput.value = ''
            messageInput.focus()
        })
    </script>
</body>
</html>
